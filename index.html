<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subject Content Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0d1320; --surface: #161e2e; --surface2: #1c2638; --line: #26324a;
      --teal: #00c6a7; --teal-dim: rgba(0,198,167,.14);
      --green: #22c55e; --green-dim: rgba(34,197,94,.14);
      --red: #ef5b5b; --red-dim: rgba(239,91,91,.14);
      --ink: #e8edf6; --muted: #8b97ad;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 28px 20px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin: 0 0 8px; font-weight: 700; }
    .sub { color: var(--muted); margin: 0 0 16px; font-size: 13px; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--line); border-radius: 8px; color: var(--ink); padding: 10px; font-family: inherit; font-size: 13px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--teal); }
    .btn { font-weight: 600; border-radius: 8px; padding: 10px 16px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
    .btn-primary { background: var(--teal); color: #06231d; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink); }
    .btn-ghost:hover { border-color: var(--muted); }
    .btn-sm { padding: 8px 12px; font-size: 12px; }
    .callout { border-radius: 8px; padding: 12px; font-size: 12px; margin-bottom: 12px; display: flex; gap: 10px; }
    .callout i { flex-shrink: 0; margin-top: 2px; }
    .callout.info { background: var(--surface2); border: 1px solid var(--line); }
    .callout.success { background: var(--green-dim); border: 1px solid rgba(34,197,94,.3); color: #86e7ab; }
    .callout.error { background: var(--red-dim); border: 1px solid rgba(239,91,91,.3); color: #f59b9b; }
    .hidden { display: none !important; }
    .chip { display: inline-block; background: var(--teal-dim); border: 1px solid rgba(0,198,167,.3); border-radius: 6px; padding: 6px 10px; font-size: 12px; margin-right: 8px; margin-bottom: 8px; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .settings-actions { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- SETTINGS (always visible) -->
    <details class="card" style="background: var(--surface); border: 1px solid var(--line);border-radius:12px;" id="settingsPanel">
      <summary style="cursor: pointer; padding: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px;">
        <i class="fa-solid fa-gear"></i> Settings & Configuration
      </summary>
      <div style="padding: 12px; border-top: 1px solid var(--line);">
        <div class="settings-grid">
          <div class="field">
            <label>Google Apps Script URL</label>
            <input type="text" id="cfgScriptUrl" placeholder="https://script.google.com/macros/d/AKfycbw.../exec">
          </div>
          <div class="field">
            <label>Shared Secret</label>
            <input type="password" id="cfgSecret" placeholder="••••••••">
          </div>
        </div>
        <div class="callout info">
          <i class="fa-solid fa-info-circle"></i>
          <div>Saved in browser only • Never sent anywhere except to your Apps Script</div>
        </div>
        <div class="settings-actions">
          <button class="btn btn-ghost btn-sm" id="btnSaveSettings"><i class="fa-solid fa-floppy-disk"></i> Save</button>
          <button class="btn btn-ghost btn-sm" id="btnTestConn"><i class="fa-solid fa-plug"></i> Test Connection</button>
          <span id="connTestResult" style="font-size: 12px; margin-left: 12px;"></span>
        </div>
      </div>
    </details>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">
      <div class="card">
        <h1>📚 Subject Content Manager</h1>
        <p class="sub">Upload questions to multiple classes with the same subject</p>
      </div>

      <!-- Step 1 -->
      <div id="step1" class="card">
        <h2 style="margin-top: 0; font-size: 18px;">Step 1: Select Classes & Subject</h2>

        <div class="field">
          <label>Classes (select multiple)</label>
          <div id="classContainer" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div class="callout info" style="grid-column: 1/-1;">
              <i class="fa-solid fa-spinner fa-spin"></i> Loading classes...
            </div>
          </div>
        </div>

        <div class="field">
          <label>Subject</label>
          <select id="subjectSelect">
            <option value="">— Loading subjects —</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="goToStep2()">
          <i class="fa-solid fa-arrow-right"></i> Proceed to Step 2
        </button>
      </div>

      <!-- Step 2 -->
      <div id="step2" class="card hidden">
        <h2 style="margin-top: 0; font-size: 18px;">Step 2: Add Questions</h2>

        <div style="background: var(--teal-dim); border: 1px solid rgba(0,198,167,.3); border-radius: 8px; padding: 12px; margin-bottom: 14px;">
          <strong style="color: var(--teal);">Selected Classes:</strong>
          <div id="selectedChips" style="margin-top: 8px;"></div>
        </div>

        <div id="questionContainer"></div>

        <button class="btn btn-ghost btn-sm" onclick="addQuestion()" style="margin-bottom: 14px;">
          <i class="fa-solid fa-plus"></i> Add Question
        </button>

        <div style="display: flex; gap: 8px;">
          <button class="btn btn-ghost" onclick="goToStep1()">← Back</button>
          <button class="btn btn-primary" onclick="submitQuestions()">
            <i class="fa-solid fa-paper-plane"></i> Submit
          </button>
        </div>
      </div>

      <!-- Step 3: Results -->
      <div id="step3" class="card hidden">
        <h2 style="margin-top: 0; font-size: 18px;">Results</h2>
        <div id="resultsContent"></div>
        <button class="btn btn-primary" onclick="goToStep1()">
          <i class="fa-solid fa-arrow-left"></i> Upload More
        </button>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════════════════════════
    let cfg = {
      scriptUrl: localStorage.getItem('scm_scriptUrl') || '',
      secret: localStorage.getItem('scm_secret') || ''
    };

    let state = {
      classes: [],
      subjects: {},
      selectedClasses: [],
      selectedSubject: '',
      questions: []
    };

    // ═══════════════════════════════════════════════════════════════════
    // SETUP
    // ═══════════════════════════════════════════════════════════════════
    function toast(type, msg) {
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    // Load settings on init
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('cfgScriptUrl').value = cfg.scriptUrl;
      document.getElementById('cfgSecret').value = cfg.secret;
      
      if (!cfg.scriptUrl) {
        document.getElementById('settingsPanel').open = true;
      } else {
        loadAppData();
      }
    });

    // Save settings
    document.getElementById('btnSaveSettings').addEventListener('click', () => {
      cfg.scriptUrl = document.getElementById('cfgScriptUrl').value.trim();
      cfg.secret = document.getElementById('cfgSecret').value;
      
      localStorage.setItem('scm_scriptUrl', cfg.scriptUrl);
      localStorage.setItem('scm_secret', cfg.secret);
      
      toast('ok', 'Settings saved');
    });

    // Test connection
    document.getElementById('btnTestConn').addEventListener('click', async () => {
      const out = document.getElementById('connTestResult');
      
      if (!cfg.scriptUrl) {
        out.textContent = '⚠ Enter URL first';
        out.style.color = 'var(--muted)';
        return;
      }
      
      out.textContent = 'Testing…';
      out.style.color = 'var(--muted)';
      
      try {
        const res = await fetch(`${cfg.scriptUrl}?action=getClassLevels&secret=${encodeURIComponent(cfg.secret)}`);
        const data = await res.json();
        
        if (data.success) {
          out.textContent = '✓ Connected! ' + data.classes.length + ' classes found';
          out.style.color = 'var(--green)';
          loadAppData();
        } else {
          out.textContent = '✗ ' + data.message;
          out.style.color = 'var(--red)';
        }
      } catch (err) {
        out.textContent = '✗ ' + err.message;
        out.style.color = 'var(--red)';
      }
    });

    function loadAppData() {
      loadClasses();
      loadSubjects();
      document.getElementById('mainApp').classList.remove('hidden');
      document.getElementById('settingsPanel').open = false;
    }

    // ═══════════════════════════════════════════════════════════════════
    // LOAD DATA
    // ═══════════════════════════════════════════════════════════════════
    async function loadClasses() {
      try {
        const response = await fetch(`${cfg.scriptUrl}?action=getClassLevels&secret=${encodeURIComponent(cfg.secret)}`);
        const data = await response.json();

        if (data.success) {
          state.classes = data.classes;
          renderClasses();
        }
      } catch (err) {
        console.error('Error loading classes:', err);
      }
    }

    async function loadSubjects() {
      try {
        const response = await fetch(`${cfg.scriptUrl}?action=getSubjectMap&secret=${encodeURIComponent(cfg.secret)}`);
        const data = await response.json();

        if (data.success) {
          state.subjects = data.subjectMap;
          const select = document.getElementById('subjectSelect');
          select.innerHTML = '<option value="">— Choose a subject —</option>';
          Object.keys(data.subjectMap).forEach(subject => {
            const opt = document.createElement('option');
            opt.value = subject;
            opt.textContent = subject;
            select.appendChild(opt);
          });
        }
      } catch (err) {
        console.error('Error loading subjects:', err);
      }
    }

    function renderClasses() {
      const html = state.classes.map((cls, i) => `
        <label style="display: flex; align-items: center; gap: 8px; padding: 10px; background: var(--surface2); border: 1px solid var(--line); border-radius: 6px; cursor: pointer;">
          <input type="checkbox" value="${cls}" onchange="updateSelectedClasses()">
          ${cls}
        </label>
      `).join('');
      
      document.getElementById('classContainer').innerHTML = html;
    }

    function updateSelectedClasses() {
      state.selectedClasses = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);
    }

    // ═══════════════════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════════════════
    function goToStep2() {
      state.selectedSubject = document.getElementById('subjectSelect').value;

      if (state.selectedClasses.length === 0) {
        alert('Select at least one class');
        return;
      }
      if (!state.selectedSubject) {
        alert('Select a subject');
        return;
      }

      document.getElementById('selectedChips').innerHTML = state.selectedClasses.map(cls => `<span class="chip">${cls}</span>`).join('');
      
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
      state.questions = [];
      addQuestion();
    }

    function goToStep1() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step3').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
    }

    // ═══════════════════════════════════════════════════════════════════
    // QUESTIONS
    // ═══════════════════════════════════════════════════════════════════
    function addQuestion() {
      const idx = state.questions.length;
      state.questions.push({
        moduleId: '', stepNum: '', question: '', optA: '', optB: '', optC: '', optD: '', correct: 'A'
      });

      const html = `
        <div style="background: var(--surface2); border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 10px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <strong>Question ${idx + 1}</strong>
            ${idx > 0 ? `<button class="btn btn-ghost btn-sm" onclick="removeQuestion(${idx})"><i class="fa-solid fa-trash"></i></button>` : ''}
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
            <div class="field">
              <label>Module ID</label>
              <input type="text" onchange="updateQuestion(${idx}, 'moduleId', this.value)">
            </div>
            <div class="field">
              <label>Step Number</label>
              <input type="number" onchange="updateQuestion(${idx}, 'stepNum', this.value)">
            </div>
          </div>

          <div class="field">
            <label>Question</label>
            <textarea onchange="updateQuestion(${idx}, 'question', this.value)" style="min-height: 60px;"></textarea>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="field">
              <label>A)</label>
              <input type="text" onchange="updateQuestion(${idx}, 'optA', this.value)">
            </div>
            <div class="field">
              <label>B)</label>
              <input type="text" onchange="updateQuestion(${idx}, 'optB', this.value)">
            </div>
            <div class="field">
              <label>C)</label>
              <input type="text" onchange="updateQuestion(${idx}, 'optC', this.value)">
            </div>
            <div class="field">
              <label>D)</label>
              <input type="text" onchange="updateQuestion(${idx}, 'optD', this.value)">
            </div>
          </div>

          <div class="field">
            <label>Correct Answer</label>
            <select onchange="updateQuestion(${idx}, 'correct', this.value)">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
        </div>
      `;

      document.getElementById('questionContainer').innerHTML += html;
    }

    function updateQuestion(idx, field, value) {
      if (state.questions[idx]) {
        state.questions[idx][field] = value;
      }
    }

    function removeQuestion(idx) {
      state.questions.splice(idx, 1);
      document.getElementById('questionContainer').innerHTML = '';
      state.questions.forEach(() => addQuestion());
    }

    // ═══════════════════════════════════════════════════════════════════
    // SUBMIT
    // ═══════════════════════════════════════════════════════════════════
    async function submitQuestions() {
      if (state.questions.length === 0) {
        alert('Add at least one question');
        return;
      }

      const btn = event.target.closest('button');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';

      try {
        const results = [];

        for (const className of state.selectedClasses) {
          try {
            const response = await fetch(cfg.scriptUrl, {
              method: 'POST',
              body: JSON.stringify({
                secret: cfg.secret,
                action: 'uploadQuestions',
                class: className,
                subject: state.selectedSubject,
                questions: state.questions
              })
            });

            const data = await response.json();
            results.push({
              class: className,
              success: data.success,
              message: data.message,
              count: data.stepsAdded || 0
            });
          } catch (err) {
            results.push({
              class: className,
              success: false,
              message: err.message,
              count: 0
            });
          }
        }

        showResults(results);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit';
      }
    }

    function showResults(results) {
      const allSuccess = results.every(r => r.success);
      let html = `
        <div class="callout ${allSuccess ? 'success' : 'error'}" style="margin-bottom: 14px;">
          <i class="fa-solid fa-${allSuccess ? 'circle-check' : 'circle-exclamation'}"></i>
          <div>
            <strong>${allSuccess ? '✓ All uploads successful!' : '✗ Some uploads failed'}</strong>
            ${results.map(r => `
              <div style="margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 4px; font-size: 12px;">
                ${r.success ? '✓' : '✗'} <strong>${r.class}:</strong> ${r.success ? r.count + ' questions added' : r.message}
              </div>
            `).join('')}
          </div>
        </div>
      `;

      document.getElementById('resultsContent').innerHTML = html;
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step3').classList.remove('hidden');
    }
  </script>
</body>
</html>
