<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subject Content Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0d1320;
      --surface: #161e2e;
      --surface2: #1c2638;
      --line: #26324a;
      --teal: #00c6a7;
      --teal-dim: rgba(0, 198, 167, 0.14);
      --red: #ef5b5b;
      --red-dim: rgba(239, 91, 91, 0.14);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.14);
      --ink: #e8edf6;
      --muted: #8b97ad;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 14.5px; }
    .wrap { max-width: 1140px; margin: 0 auto; padding: 28px 24px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px 24px; margin-bottom: 18px; }
    .card h2 { margin: 0 0 12px; font-size: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--line); border-radius: 8px; color: var(--ink); padding: 10px 12px; font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--teal); }
    .btn { font-weight: 600; border-radius: 8px; padding: 10px 16px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--teal); color: #06231d; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink); }
    .callout { border-radius: 8px; padding: 12px 14px; font-size: 13px; display: flex; gap: 10px; margin-bottom: 14px; }
    .callout.info { background: var(--surface2); border: 1px solid var(--line); }
    .callout.success { background: var(--green-dim); border: 1px solid rgba(34, 197, 94, 0.3); color: #86e7ab; }
    .callout.error { background: var(--red-dim); border: 1px solid rgba(239, 91, 91, 0.3); color: #f59b9b; }
    .loading { display: none; }
    .loading.show { display: block; }
    .chip { display: inline-block; background: var(--teal-dim); border: 1px solid rgba(0, 198, 167, 0.3); border-radius: 6px; padding: 6px 12px; font-size: 13px; margin-right: 8px; margin-bottom: 8px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📚 Subject Content Manager</h1>
    
    <!-- Status Display -->
    <div id="statusBox" class="callout info">
      <i class="fa-solid fa-circle-info"></i>
      <div>
        <strong>Status:</strong> <span id="statusText">Initializing...</span>
      </div>
    </div>

    <!-- Step 1: Class & Subject Selection -->
    <div id="step1" class="card">
      <h2>Step 1: Select Classes & Subject</h2>
      
      <div class="field">
        <label>Classes (select multiple)</label>
        <div id="classContainer" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
          <div class="callout info" style="grid-column: 1/-1;">
            <i class="fa-solid fa-spinner fa-spin"></i> Loading classes...
          </div>
        </div>
      </div>

      <div class="field">
        <label>Subject</label>
        <select id="subjectSelect">
          <option value="">— Choose a subject —</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="proceedToStep2()">
        <i class="fa-solid fa-arrow-right"></i> Proceed
      </button>
    </div>

    <!-- Step 2: Add Questions -->
    <div id="step2" class="card hidden">
      <h2>Step 2: Add Questions</h2>
      
      <div id="selectedInfo" style="background: var(--teal-dim); border: 1px solid rgba(0, 198, 167, 0.3); border-radius: 8px; padding: 12px; margin-bottom: 14px;">
        <strong style="color: var(--teal);">Selected Classes:</strong>
        <div id="selectedClassChips" style="margin-top: 8px;"></div>
      </div>

      <div id="questionContainer"></div>
      
      <button class="btn btn-ghost" onclick="addQuestion()" style="margin-bottom: 12px;">
        <i class="fa-solid fa-plus"></i> Add Question
      </button>

      <div style="display: flex; gap: 8px;">
        <button class="btn btn-ghost" onclick="backToStep1()">← Back</button>
        <button class="btn btn-primary" onclick="submitQuestions()">
          <i class="fa-solid fa-paper-plane"></i> Submit
        </button>
      </div>
    </div>

    <!-- Results -->
    <div id="results" class="card hidden">
      <h2>Results</h2>
      <div id="resultsContent"></div>
      <button class="btn btn-primary" onclick="restart()">Upload More</button>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════════════
    const GAS_URL = 'https://script.google.com/macros/d/AKfycbwkwNebAvtZ_4CeBpdWJr70hhuFP7bpvKvXAhmfpIWCH5cZmgE1Gs6t4ZsQxw8j_kWc-Q/exec';
    const SECRET = '123456';

    // ═══════════════════════════════════════════════════════════════════
    // APP STATE
    // ═══════════════════════════════════════════════════════════════════
    let state = {
      classes: [],
      subjects: {},
      selectedClasses: [],
      selectedSubject: '',
      questions: []
    };

    // ═══════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════════
    async function init() {
      try {
        updateStatus('Loading classes...');
        await loadClasses();
        await loadSubjects();
        updateStatus('Ready!');
      } catch (err) {
        updateStatus('Error: ' + err.message);
      }
    }

    function updateStatus(text) {
      document.getElementById('statusText').textContent = text;
      console.log('[STATUS]', text);
    }

    // ═══════════════════════════════════════════════════════════════════
    // LOAD DATA FROM APPS SCRIPT
    // ═══════════════════════════════════════════════════════════════════
    async function loadClasses() {
      const url = GAS_URL + '?action=getClassLevels&secret=' + SECRET;
      console.log('Fetching classes from:', url);
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.success && data.classes) {
          state.classes = data.classes;
          renderClasses();
          console.log('Classes loaded:', data.classes);
        } else {
          throw new Error(data.message || 'Failed to load classes');
        }
      } catch (err) {
        console.error('Error loading classes:', err);
        throw err;
      }
    }

    async function loadSubjects() {
      const url = GAS_URL + '?action=getSubjectMap&secret=' + SECRET;
      console.log('Fetching subjects from:', url);
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.success && data.subjectMap) {
          state.subjects = data.subjectMap;
          renderSubjects();
          console.log('Subjects loaded:', Object.keys(data.subjectMap));
        } else {
          throw new Error(data.message || 'Failed to load subjects');
        }
      } catch (err) {
        console.error('Error loading subjects:', err);
        throw err;
      }
    }

    function renderClasses() {
      const html = state.classes.map((cls, i) => `
        <label style="display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--surface2); border: 1px solid var(--line); border-radius: 6px; cursor: pointer;">
          <input type="checkbox" value="${cls}" onchange="updateSelectedClasses()">
          ${cls}
        </label>
      `).join('');
      
      document.getElementById('classContainer').innerHTML = html || '<p style="color: var(--muted);">No classes found</p>';
    }

    function renderSubjects() {
      const select = document.getElementById('subjectSelect');
      Object.keys(state.subjects).forEach(subject => {
        const opt = document.createElement('option');
        opt.value = subject;
        opt.textContent = subject;
        select.appendChild(opt);
      });
    }

    function updateSelectedClasses() {
      state.selectedClasses = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);
      console.log('Selected classes:', state.selectedClasses);
    }

    // ═══════════════════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════════════════
    function proceedToStep2() {
      state.selectedSubject = document.getElementById('subjectSelect').value;
      
      if (state.selectedClasses.length === 0) {
        alert('Please select at least one class');
        return;
      }
      
      if (!state.selectedSubject) {
        alert('Please select a subject');
        return;
      }
      
      document.getElementById('selectedClassChips').innerHTML = state.selectedClasses.map(cls => 
        `<span class="chip">${cls}</span>`
      ).join('');
      
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
      state.questions = [];
      addQuestion();
    }

    function backToStep1() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
    }

    function restart() {
      document.getElementById('results').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
      state.selectedClasses = [];
      state.selectedSubject = '';
      state.questions = [];
      document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
      document.getElementById('subjectSelect').value = '';
      document.getElementById('questionContainer').innerHTML = '';
    }

    // ═══════════════════════════════════════════════════════════════════
    // QUESTIONS
    // ═══════════════════════════════════════════════════════════════════
    function addQuestion() {
      const idx = state.questions.length;
      state.questions.push({
        moduleId: '',
        stepNum: '',
        question: '',
        optA: '',
        optB: '',
        optC: '',
        optD: '',
        correct: 'A'
      });

      const html = `
        <div style="background: var(--surface2); border: 1px solid var(--line); border-radius: 8px; padding: 14px; margin-bottom: 12px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <strong>Question ${idx + 1}</strong>
            ${idx > 0 ? `<button class="btn btn-ghost" style="padding: 4px 8px;" onclick="removeQuestion(${idx})"><i class="fa-solid fa-trash"></i></button>` : ''}
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
            <div class="field">
              <label>Module ID</label>
              <input type="text" onchange="updateQuestion(${idx}, 'moduleId', this.value)">
            </div>
            <div class="field">
              <label>Step Number</label>
              <input type="number" onchange="updateQuestion(${idx}, 'stepNum', this.value)">
            </div>
          </div>

          <div class="field">
            <label>Question</label>
            <textarea onchange="updateQuestion(${idx}, 'question', this.value)" style="min-height: 60px;"></textarea>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
            <div class="field">
              <label>Option A</label>
              <input type="text" onchange="updateQuestion(${idx}, 'optA', this.value)">
            </div>
            <div class="field">
              <label>Option B</label>
              <input type="text" onchange="updateQuestion(${idx}, 'optB', this.value)">
            </div>
            <div class="field">
              <label>Option C</label>
              <input type="text" onchange="updateQuestion(${idx}, 'optC', this.value)">
            </div>
            <div class="field">
              <label>Option D</label>
              <input type="text" onchange="updateQuestion(${idx}, 'optD', this.value)">
            </div>
          </div>

          <div class="field">
            <label>Correct Answer</label>
            <select onchange="updateQuestion(${idx}, 'correct', this.value)">
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
        </div>
      `;

      document.getElementById('questionContainer').innerHTML += html;
    }

    function updateQuestion(idx, field, value) {
      if (state.questions[idx]) {
        state.questions[idx][field] = value;
        console.log('Updated Q' + (idx + 1) + ' ' + field, value);
      }
    }

    function removeQuestion(idx) {
      state.questions.splice(idx, 1);
      document.getElementById('questionContainer').innerHTML = '';
      state.questions.forEach(() => addQuestion());
    }

    // ═══════════════════════════════════════════════════════════════════
    // SUBMIT
    // ═══════════════════════════════════════════════════════════════════
    async function submitQuestions() {
      if (state.questions.length === 0) {
        alert('Please add at least one question');
        return;
      }

      const btn = event.target.closest('button');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';

      try {
        updateStatus('Uploading to ' + state.selectedClasses.length + ' classes...');
        const results = [];

        for (const className of state.selectedClasses) {
          try {
            const response = await fetch(GAS_URL, {
              method: 'POST',
              body: JSON.stringify({
                secret: SECRET,
                action: 'uploadQuestions',
                class: className,
                subject: state.selectedSubject,
                questions: state.questions
              })
            });

            const data = await response.json();
            results.push({
              class: className,
              success: data.success,
              message: data.message,
              count: data.stepsAdded || 0
            });
          } catch (err) {
            results.push({
              class: className,
              success: false,
              message: err.message,
              count: 0
            });
          }
        }

        showResults(results);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit';
      }
    }

    function showResults(results) {
      const allSuccess = results.every(r => r.success);
      let html = `
        <div class="callout ${allSuccess ? 'success' : 'error'}" style="margin-bottom: 16px;">
          <i class="fa-solid fa-${allSuccess ? 'circle-check' : 'circle-exclamation'}"></i>
          <div>
            ${allSuccess ? '✓ All uploads successful!' : '✗ Some uploads failed'}
            ${results.map(r => `
              <div style="margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 4px;">
                <strong>${r.class}:</strong> ${r.success ? `✓ ${r.count} questions added` : `✗ ${r.message}`}
              </div>
            `).join('')}
          </div>
        </div>
      `;

      document.getElementById('resultsContent').innerHTML = html;
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
      updateStatus('Upload complete!');
    }

    // Start on load
    window.addEventListener('load', init);
  </script>
</body>
</html>
