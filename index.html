<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subject Content Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; background: #0d1320; color: #e8edf6; font-family: 'Inter', sans-serif; }
    .container { max-width: 900px; margin: 0 auto; }
    .card { background: #161e2e; border: 1px solid #26324a; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    h1 { margin: 0 0 10px; font-size: 24px; }
    .subtitle { color: #8b97ad; margin: 0 0 20px; }
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #8b97ad; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 10px; background: #1c2638; border: 1px solid #26324a; border-radius: 8px; color: #e8edf6; font-family: inherit; font-size: 14px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #00c6a7; }
    .btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn-primary { background: #00c6a7; color: #06231d; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost { background: transparent; border: 1px solid #26324a; color: #e8edf6; }
    .alert { padding: 12px; border-radius: 8px; margin-bottom: 15px; }
    .alert.ok { background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.3); color: #86e7ab; }
    .alert.err { background: rgba(239,91,91,.15); border: 1px solid rgba(239,91,91,.3); color: #f59b9b; }
    .hidden { display: none !important; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    textarea { resize: vertical; min-height: 80px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- SETTINGS -->
    <div class="card">
      <h1>⚙️ Settings</h1>
      <p class="subtitle">Configure your connection</p>
      
      <div class="field">
        <label>Apps Script URL (from Google Apps Script deployment)</label>
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>

      <div class="field">
        <label>Secret (usually 123456)</label>
        <input type="password" id="secret" placeholder="123456" value="123456">
      </div>

      <button class="btn btn-primary" onclick="testConnection()">
        <i class="fa-solid fa-plug"></i> Test Connection
      </button>

      <div id="connStatus"></div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">
      <!-- STEP 1 -->
      <div class="card">
        <h1>Step 1: Select Class & Subject</h1>
        
        <div class="field">
          <label>Class</label>
          <select id="selClass" onchange="loadSubjects()">
            <option value="">Loading...</option>
          </select>
        </div>

        <div class="field">
          <label>Subject</label>
          <select id="selSubject">
            <option value="">Select class first</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="goStep(2)">Next →</button>
        
        <div id="reorganiseOption" class="hidden" style="margin-top: 20px;">
          <div class="alert ok">
            <strong>Reorganise?</strong> Clean up existing questions instead of adding new ones.
            <br><br>
            <button class="btn btn-primary" onclick="startReorganise()" style="background: #22c55e;">Reorganise</button>
            <button class="btn btn-ghost" onclick="goStep(2)">Add Questions</button>
          </div>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="card hidden" id="step2">
        <h1>Step 2: Add Questions</h1>
        
        <div class="field">
          <label>Question Type</label>
          <select id="qType">
            <option value="MCQ">Multiple Choice (MCQ)</option>
            <option value="Match">Match the Following</option>
          </select>
        </div>

        <!-- MCQ Form -->
        <div id="mcqForm">
          <div class="grid2">
            <div class="field">
              <label>Module ID</label>
              <input type="text" id="mcqMod" placeholder="MOD01">
            </div>
            <div class="field">
              <label>Step Number</label>
              <input type="number" id="mcqStep" placeholder="1">
            </div>
          </div>

          <div class="field">
            <label>Question</label>
            <textarea id="mcqQ" placeholder="What is...?"></textarea>
          </div>

          <div class="grid2">
            <div class="field">
              <label>A)</label>
              <input type="text" id="mcqA" placeholder="Option A">
            </div>
            <div class="field">
              <label>B)</label>
              <input type="text" id="mcqB" placeholder="Option B">
            </div>
            <div class="field">
              <label>C)</label>
              <input type="text" id="mcqC" placeholder="Option C">
            </div>
            <div class="field">
              <label>D)</label>
              <input type="text" id="mcqD" placeholder="Option D">
            </div>
          </div>

          <div class="field">
            <label>Correct Answer</label>
            <select id="mcqCorrect">
              <option>A</option>
              <option>B</option>
              <option>C</option>
              <option>D</option>
            </select>
          </div>

          <button class="btn btn-primary" onclick="addMCQ()">+ Add MCQ</button>
        </div>

        <!-- Match Form -->
        <div id="matchForm" class="hidden">
          <div class="grid2">
            <div class="field">
              <label>Module ID</label>
              <input type="text" id="matchMod" placeholder="MOD01">
            </div>
            <div class="field">
              <label>Step Number</label>
              <input type="number" id="matchStep" placeholder="1">
            </div>
          </div>

          <div class="field">
            <label>Question</label>
            <textarea id="matchQ" placeholder="Match the following..."></textarea>
          </div>

          <div class="grid2">
            <div class="field">
              <label>Left 1</label>
              <input type="text" id="ml1">
            </div>
            <div class="field">
              <label>Right 1</label>
              <input type="text" id="mr1">
            </div>
            <div class="field">
              <label>Left 2</label>
              <input type="text" id="ml2">
            </div>
            <div class="field">
              <label>Right 2</label>
              <input type="text" id="mr2">
            </div>
            <div class="field">
              <label>Left 3</label>
              <input type="text" id="ml3">
            </div>
            <div class="field">
              <label>Right 3</label>
              <input type="text" id="mr3">
            </div>
            <div class="field">
              <label>Left 4</label>
              <input type="text" id="ml4">
            </div>
            <div class="field">
              <label>Right 4</label>
              <input type="text" id="mr4">
            </div>
            <div class="field">
              <label>Left 5</label>
              <input type="text" id="ml5">
            </div>
            <div class="field">
              <label>Right 5</label>
              <input type="text" id="mr5">
            </div>
          </div>

          <button class="btn btn-primary" onclick="addMatch()">+ Add Match</button>
        </div>

        <div id="qList" style="margin-top: 20px;"></div>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
          <button class="btn btn-ghost" onclick="goStep(1)">← Back</button>
          <button class="btn btn-primary" onclick="goStep(3)">Review & Submit →</button>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="card hidden" id="step3">
        <h1>Step 3: Submit</h1>
        
        <div id="summary" style="background: #1c2638; padding: 15px; border-radius: 8px; margin-bottom: 15px;"></div>

        <button class="btn btn-primary" onclick="submit()">Submit Questions</button>
        <button class="btn btn-ghost" onclick="goStep(2)" style="margin-left: 10px;">← Back</button>

        <div id="result" style="margin-top: 20px;"></div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      scriptUrl: localStorage.getItem('scriptUrl') || '',
      secret: localStorage.getItem('secret') || '123456',
      classes: [],
      subjects: [],
      selectedClass: '',
      selectedSubject: '',
      questions: [],
      step: 1
    };

    document.getElementById('scriptUrl').value = state.scriptUrl;
    document.getElementById('secret').value = state.secret;

    // Test Connection
    async function testConnection() {
      const url = document.getElementById('scriptUrl').value.trim();
      const secret = document.getElementById('secret').value;
      const status = document.getElementById('connStatus');

      if (!url) {
        status.innerHTML = '<div class="alert err">Enter URL</div>';
        return;
      }

      status.innerHTML = '<div class="alert ok">Testing...</div>';

      try {
        const res = await fetch(`${url}?action=getClassLevels&secret=${encodeURIComponent(secret)}`);
        const data = await res.json();

        if (data.success) {
          state.scriptUrl = url;
          state.secret = secret;
          localStorage.setItem('scriptUrl', url);
          localStorage.setItem('secret', secret);
          state.classes = data.classes;
          status.innerHTML = '<div class="alert ok">✓ Connected! ' + data.classes.length + ' classes found</div>';
          loadClasses();
          document.getElementById('mainApp').classList.remove('hidden');
        } else {
          status.innerHTML = '<div class="alert err">' + data.message + '</div>';
        }
      } catch (err) {
        status.innerHTML = '<div class="alert err">Failed: ' + err.message + '</div>';
      }
    }

    // Load Classes
    async function loadClasses() {
      const select = document.getElementById('selClass');
      
      try {
        const res = await fetch(`${state.scriptUrl}?action=getClassLevels&secret=${encodeURIComponent(state.secret)}`);
        const data = await res.json();

        if (data.success) {
          state.classes = data.classes;
          select.innerHTML = '<option value="">Choose class...</option>' + 
            state.classes.map(c => `<option value="${c}">${c}</option>`).join('');
        } else {
          select.innerHTML = '<option value="">Error: ' + data.message + '</option>';
        }
      } catch (err) {
        select.innerHTML = '<option value="">Error: ' + err.message + '</option>';
      }
    }

    // Load Subjects
    async function loadSubjects() {
      state.selectedClass = document.getElementById('selClass').value;
      
      try {
        const res = await fetch(`${state.scriptUrl}?action=getSubjects&secret=${encodeURIComponent(state.secret)}`);
        const data = await res.json();
        
        if (data.success) {
          state.subjects = data.subjects;
          const select = document.getElementById('selSubject');
          select.innerHTML = '<option value="">Choose subject...</option>' + 
            state.subjects.map(s => `<option value="${s}">${s}</option>`).join('');
          
          // Show reorganise option if class selected
          const reorganiseOpt = document.getElementById('reorganiseOption');
          reorganiseOpt.classList.toggle('hidden', !state.selectedClass);
        }
      } catch (err) {
        console.error('Error loading subjects:', err);
      }
    }

    // Add MCQ
    function addMCQ() {
      const q = {
        type: 'MCQ',
        moduleId: document.getElementById('mcqMod').value,
        stepNum: document.getElementById('mcqStep').value,
        question: document.getElementById('mcqQ').value,
        optA: document.getElementById('mcqA').value,
        optB: document.getElementById('mcqB').value,
        optC: document.getElementById('mcqC').value,
        optD: document.getElementById('mcqD').value,
        correct: document.getElementById('mcqCorrect').value
      };

      if (!q.question || !q.optA || !q.optB || !q.optC || !q.optD) {
        alert('Fill all fields');
        return;
      }

      state.questions.push(q);
      document.getElementById('mcqMod').value = '';
      document.getElementById('mcqStep').value = '';
      document.getElementById('mcqQ').value = '';
      showQuestions();
    }

    // Add Match
    function addMatch() {
      const q = {
        type: 'Match',
        moduleId: document.getElementById('matchMod').value,
        stepNum: document.getElementById('matchStep').value,
        question: document.getElementById('matchQ').value,
        left1: document.getElementById('ml1').value,
        right1: document.getElementById('mr1').value,
        left2: document.getElementById('ml2').value,
        right2: document.getElementById('mr2').value,
        left3: document.getElementById('ml3').value,
        right3: document.getElementById('mr3').value,
        left4: document.getElementById('ml4').value,
        right4: document.getElementById('mr4').value,
        left5: document.getElementById('ml5').value,
        right5: document.getElementById('mr5').value,
      };

      state.questions.push(q);
      showQuestions();
    }

    function showQuestions() {
      const list = document.getElementById('qList');
      list.innerHTML = state.questions.map((q, i) => `
        <div style="background: #1c2638; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between;">
          <div><strong>#${i+1} ${q.type}</strong></div>
          <button class="btn btn-ghost" onclick="removeQ(${i})" style="padding: 4px 8px;">✕</button>
        </div>
      `).join('');
    }

    function removeQ(i) {
      state.questions.splice(i, 1);
      showQuestions();
    }

    // Question type toggle
    document.getElementById('qType').addEventListener('change', (e) => {
      const isMCQ = e.target.value === 'MCQ';
      document.getElementById('mcqForm').classList.toggle('hidden', !isMCQ);
      document.getElementById('matchForm').classList.toggle('hidden', isMCQ);
    });

    // Navigation
    function goStep(n) {
      if (n === 1) {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
      } else if (n === 2) {
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('step3').classList.add('hidden');
      } else if (n === 3) {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        state.selectedSubject = document.getElementById('selSubject').value;
        document.getElementById('summary').innerHTML = `
          <div><strong>Class:</strong> ${state.selectedClass}</div>
          <div><strong>Subject:</strong> ${state.selectedSubject}</div>
          <div><strong>Questions:</strong> ${state.questions.length}</div>
        `;
      }
      state.step = n;
    }

    // Submit
    async function submit() {
      if (!state.questions.length) {
        alert('Add questions first');
        return;
      }

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '⏳ Submitting...';

      try {
        const payload = {
          action: 'uploadQuestions',
          secret: state.secret,
          class: state.selectedClass,
          subject: state.selectedSubject,
          questions: state.questions
        };

        const res = await fetch(state.scriptUrl, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('result').innerHTML = `<div class="alert ok">✓ ${data.message}</div>`;
          setTimeout(() => location.reload(), 2000);
        } else {
          document.getElementById('result').innerHTML = `<div class="alert err">✗ ${data.message}</div>`;
        }
      } catch (err) {
        document.getElementById('result').innerHTML = `<div class="alert err">✗ ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Questions';
      }
    }

    // Reorganise
    async function startReorganise() {
      state.selectedSubject = document.getElementById('selSubject').value;
      
      const payload = {
        action: 'reorganise',
        secret: state.secret,
        class: state.selectedClass,
        subject: state.selectedSubject
      };

      try {
        const res = await fetch(state.scriptUrl, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        
        if (data.success) {
          alert('✓ Reorganised!\n' + data.duplicates + ' duplicates marked in pink');
          location.reload();
        } else {
          alert('✗ ' + data.message);
        }
      } catch (err) {
        alert('✗ Error: ' + err.message);
      }
    }
  </script>
</body>
</html>
